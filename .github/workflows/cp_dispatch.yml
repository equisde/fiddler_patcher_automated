name: Custom Version - Workflow Dispatch (Cloud Edition)

on:
  workflow_dispatch:
    inputs:
      version_to_patch:
        description: 'The Version You Want to Patch'
        required: true
        default: '7.0.0'
      os-and-arch:
        description: 'Operating System And Architecture'
        required: true
        type: choice
        options:
          - Windows (x86_64)
          - Linux (x86_64)
      patch-server-port:
        description: 'Patch server port (Default 5678)'
        required: true
        default: '5678'

defaults:
  run:
    shell: pwsh

env:
  OS_ARCH: ${{ github.event.inputs.os-and-arch }}
  VERSION_TO_PATCH: ${{ github.event.inputs.version_to_patch }}
  PATCH_SERVER_PORT: ${{ github.event.inputs.patch-server-port }}

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.get_validity.outputs.is_valid }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate Fiddler Version
        id: get_validity
        working-directory: utils/fe-version-validator
        run: |
          ./Validate-FEVersion.ps1 -VersionToPatch $env:VERSION_TO_PATCH

  init_os_arch:
    runs-on: ubuntu-latest
    outputs:
      library_extension:  ${{ steps.set_library_extension.outputs.library_extension }}
      arch_code:  ${{ steps.set_arch.outputs.arch_code }}
    steps:
      - name: Set OS Info
        id: set_library_extension
        run: |
          $ext = ($env:OS_ARCH -match 'Windows') ? 'dll' : (($env:OS_ARCH -match 'Linux') ? 'so' : 'dylib')
          "library_extension=$ext" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
      - name: Set Arch Code
        id: set_arch
        run: |
          $code = ($env:OS_ARCH -match 'Windows') ? 'win32-x86_64' : 'linux-x86_64'
          "arch_code=$code" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
   
  download-Yui-patch:
    runs-on: ubuntu-latest
    needs: [validate-version, init_os_arch]
    if: needs.validate-version.outputs.is_valid == 'true'
    outputs:
      Yui-fiddler-name: ${{ steps.Yui-fiddler-name.outputs.Yui-fiddler-name }}
    steps:
      - name: Set Names
        id: Yui-fiddler-name
        run: |
          $name = ($env:OS_ARCH -match 'Windows') ? 'fiddler.dll' : 'libfiddler.so'
          echo "Yui-fiddler-name=$name" >> $env:GITHUB_OUTPUT
      - name: Download Yui
        run: |
          mkdir Yui
          $url = "https://github.com/project-yui/Yui-patch/releases/download/continuous/yui-$(($env:OS_ARCH -match 'Windows') ? 'fiddler' : 'libfiddler')-${{ needs.init_os_arch.outputs.arch_code }}-continuous.$(($env:OS_ARCH -match 'Windows') ? 'dll' : 'so')"
          Invoke-WebRequest -Uri $url -OutFile "Yui/$($steps.Yui-fiddler-name.outputs.Yui-fiddler-name)"
      - name: Upload Yui
        uses: actions/upload-artifact@v4
        with:
          name: Yui-patch
          path: Yui/

  download-msojocs-server:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Your Custom Cloud Patcher
        run: |
          git clone https://github.com/equisde/fiddler_patcher.git msojocs
      - name: Upload Patch Source
        uses: actions/upload-artifact@v4
        with:
          name: msojocs-patch
          path: msojocs/server/

  download-fiddler:
    runs-on: ubuntu-latest
    steps:
      - name: Download & Extract FE
        run: |
          $v = $env:VERSION_TO_PATCH
          if ($env:OS_ARCH -match 'Windows') {
            $url = "https://downloads.getfiddler.com/win/Fiddler%20Everywhere%20$v.exe"
            Invoke-WebRequest -Uri $url -OutFile "setup.exe"
            7z x "setup.exe" -ofe_extracted
            7z x "fe_extracted/`$PLUGINSDIR/app-64.7z" -ofe_app
          } else {
            $url = "https://downloads.getfiddler.com/linux/fiddler-everywhere-$v.AppImage"
            Invoke-WebRequest -Uri $url -OutFile "setup.AppImage"
            # Note: AppImage extraction in CI might need options
            # Simplified for this example
            mkdir fe_app
          }
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: fe_app
          path: fe_app/

  patch_fe:
    runs-on: windows-latest
    needs: [download-Yui-patch, download-msojocs-server, download-fiddler]
    steps:
      - name: Setup Workspace
        uses: actions/download-artifact@v4
      - name: Apply Yui DLL
        run: |
          $target = "fe_app/$((Get-ChildItem Yui-patch).Name)"
          Copy-Item -Path "Yui-patch/*" -Destination "fe_app/" -Force
      - name: Inyect Cloud Gateway
        run: |
          $main = "fe_app/resources/app/out/main.js"
          $original = "fe_app/resources/app/out/main.original.js"
          Copy-Item $main $original
          $gateway = Get-Content "msojocs-patch/index.js" -Raw
          $gateway = $gateway -replace 'const port = \d+;', "const port = $env:PATCH_SERVER_PORT;"
          Set-Content $main -Value ($gateway + "`n" + "require('./main.original.js');")
      - name: Patch UI URLs
        run: |
          Get-ChildItem -Path "fe_app/resources/app/out/WebServer/ClientApp/dist" -Filter main*.js -Recurse | ForEach-Object {
            (Get-Content $_.FullName) -replace 'https://api.getfiddler.com', "http://127.0.0.1:$env:PATCH_SERVER_PORT/api.getfiddler.com" -replace 'https://identity.getfiddler.com', "http://127.0.0.1:$env:PATCH_SERVER_PORT/identity.getfiddler.com" | Set-Content $_.FullName
          }
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: "Fiddler-Cloud-V$env:VERSION_TO_PATCH"
          path: fe_app/
